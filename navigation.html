<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+15 Pathfinder — Calgary Skywalk Navigation</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  :root{
    /* Material 3 tokens from the Stitch design */
    --primary:#00346f; --on-primary:#fff; --primary-container:#004a99; --surface-tint:#255dad;
    --secondary:#904d00; --secondary-container:#fd8b00; --on-secondary-container:#603100;
    --tertiary-container:#00591c; --on-tertiary:#fff; --on-tertiary-container:#5cd46c;
    --error:#ba1a1a; --on-error:#fff;
    --surface:#f6faff; --surface-cl:#ecf5fe; --surface-c:#e6eff8; --surface-ch:#e0e9f2; --surface-chh:#dbe4ed;
    --on-surface:#141d23; --on-surface-variant:#424751; --outline:#737783; --outline-variant:#c2c6d3;
    --shadow:0 4px 20px rgba(0,52,111,.15); --shadow-up:0 -8px 30px rgba(0,52,111,.15);
    /* legacy aliases still referenced by JS inline styles */
    --ink:#dbe4ed; --ink-2:var(--surface); --ink-3:var(--surface-c);
    --snow:var(--on-surface); --mute:var(--outline); --route:#fd8b00; --ok:#5cd46c; --warn:#603100; --me:#255dad;
    --ice:#2e86c1; --ice-dim:#aacbe3;
    --sans:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  @supports(height:100dvh){html,body{height:100dvh}}
  body{font-family:var(--sans);background:var(--surface);color:var(--on-surface);overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation}
  #map{position:absolute;inset:0;background:var(--ink)}
  .leaflet-container{background:var(--ink);font-family:var(--sans)}
  button{font-family:inherit;cursor:pointer;border:none}
  .ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;
    letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;
    -webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased;
    font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

  /* ── Top floating search (Stitch: Search Places) ── */
  #topbar{position:absolute;z-index:1200;top:14px;left:14px;width:392px;max-width:calc(100% - 28px);
    display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:9999px;
    padding:11px 14px;box-shadow:var(--shadow)}
  #topbar .ms{color:var(--on-surface-variant);font-size:22px;flex:0 0 auto}
  #searchBox{flex:1;min-width:0;border:none;outline:none;font:16px/1.4 var(--sans);
    color:var(--on-surface);background:transparent}
  #searchBox::placeholder{color:rgba(66,71,81,.7)}
  #topbar button{flex:0 0 32px;width:32px;height:32px;border-radius:50%;background:transparent;
    color:var(--on-surface-variant);font-size:15px;padding:0}
  #topbar button:hover{background:var(--surface-chh)}
  #popBtn,#popMenu{display:none!important}
  #suggest{position:absolute;z-index:1190;top:74px;left:14px;width:392px;max-width:calc(100% - 28px);
    background:var(--surface);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;display:none;
    max-height:54vh;overflow-y:auto;padding:6px}
  .sg{display:flex;align-items:center;gap:12px;padding:11px 12px;cursor:pointer;font-size:15px;
    color:var(--on-surface);border-radius:18px}
  .sg:hover,.sg.active{background:var(--surface-cl)}
  .sg .si{flex:0 0 36px;width:36px;height:36px;border-radius:50%;background:var(--surface-tint);
    display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff}
  .sg .tag{margin-left:auto;font-size:11px;font-weight:500;color:var(--on-secondary-container);
    background:#ffdcc3;border-radius:9999px;padding:2px 9px;flex:0 0 auto}
  .sg b{color:var(--primary)}

  /* ── Floating action buttons (right edge) ── */
  #fabs{position:absolute;z-index:1100;right:16px;bottom:200px;display:flex;flex-direction:column;gap:14px}
  #recenterBtn{width:52px;height:52px;border-radius:50%;background:var(--surface);color:var(--primary);
    box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:22px}
  #recenterBtn:active{transform:scale(.95)}

  /* ── Bottom sheet ── */
  #panel{position:absolute;z-index:1000;bottom:0;left:0;width:100%;
    max-height:min(58%,560px);display:flex;flex-direction:column;
    background:rgba(246,250,255,.96);backdrop-filter:blur(10px);
    border-radius:24px 24px 0 0;box-shadow:var(--shadow-up);
    transition:max-height .25s ease;padding-bottom:env(safe-area-inset-bottom)}
  @media (min-width:641px){
    #panel{left:16px;bottom:16px;width:400px;border-radius:24px;max-height:min(72%,620px)}
  }
  #panel.collapsed{max-height:148px}
  #panel.collapsed .body{overflow:hidden}
  #handle{display:block;padding:10px 0 6px;cursor:grab;touch-action:none;flex:0 0 auto}
  #handle::before{content:"";display:block;width:48px;height:6px;border-radius:9999px;background:var(--outline-variant);margin:0 auto}
  .body{padding:4px 20px 22px;overflow-y:auto}

  /* home card (quick actions + popular places) */
  .qa{display:flex;gap:14px;margin-bottom:18px}
  .qa button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px 8px;background:var(--surface-c);border-radius:24px;border:1px solid rgba(194,198,211,.25)}
  .qa button:active{transform:scale(.96)}
  .qa .qi{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    margin-bottom:7px;font-size:19px}
  .qa .qi.loc{background:#d7e2ff;color:#00458f}
  .qa .qi.star{background:var(--secondary-container);color:var(--on-secondary-container)}
  .qa span.t{font-size:12px;font-weight:500;color:var(--on-surface)}
  .sheet-h2{font-size:19px;font-weight:600;color:var(--on-surface);margin:0 0 13px}
  #popGrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .pop{display:flex;align-items:center;gap:11px;background:var(--surface-cl);border:1px solid rgba(194,198,211,.3);
    border-radius:22px;padding:11px 12px;text-align:left;min-height:62px}
  .pop:hover{background:var(--surface-c)}
  .pop:active{transform:scale(.97)}
  .pop .pe{flex:0 0 40px;width:40px;height:40px;border-radius:50%;background:var(--surface-tint);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:19px}
  .pop .pn{font-size:13.5px;font-weight:600;color:var(--on-surface);line-height:1.3}
  .pop .ps{font-size:11.5px;font-weight:500;color:var(--on-surface-variant);margin-top:1px}

  /* destination card */
  .dc-top{display:flex;align-items:flex-start;gap:10px;margin:4px 0 14px}
  #dcName{font-size:20px;font-weight:600;color:var(--on-surface);line-height:1.3;overflow-wrap:break-word}
  #dcBlurb{font-size:13.5px;color:var(--outline);margin-top:4px;line-height:1.5}
  .xbtn{flex:0 0 40px;width:40px;height:40px;border-radius:50%;background:var(--surface-c);
    color:var(--primary);font-size:17px;display:flex;align-items:center;justify-content:center;margin-left:auto}
  .xbtn:active{transform:scale(.93)}
  .bigbtn{width:100%;height:56px;border-radius:9999px;display:flex;align-items:center;justify-content:center;
    gap:9px;font-size:17px;font-weight:600}
  .bigbtn.go{background:var(--tertiary-container);color:var(--on-tertiary);
    box-shadow:0 4px 12px rgba(0,89,28,.2)}
  .bigbtn:active{transform:scale(.97)}
  .dc-hint{font-size:12.5px;color:var(--outline);margin-top:11px;line-height:1.5;text-align:center}

  /* route preview (Stitch: Route Preview) */
  .ab{display:flex;align-items:center;gap:13px;margin:2px 0 15px}
  .ab .dots{display:flex;flex-direction:column;align-items:center;margin-top:2px}
  .ab .da{width:12px;height:12px;border-radius:50%;background:var(--on-tertiary-container);box-shadow:0 1px 2px rgba(0,0,0,.15)}
  .ab .dl{width:2px;height:22px;background:var(--outline-variant);margin:4px 0}
  .ab .db{width:12px;height:12px;border-radius:50%;background:var(--secondary-container);box-shadow:0 1px 2px rgba(0,0,0,.15)}
  .ab .names{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
  .ab .nm2{font-size:17px;font-weight:600;color:var(--on-surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ab .sep{height:1px;background:var(--surface-chh)}
  #swap{flex:0 0 40px;width:40px;height:40px;border-radius:50%;background:var(--surface-c);color:var(--primary);
    font-size:18px;display:flex;align-items:center;justify-content:center}
  .statsbar{display:flex;justify-content:space-between;align-items:center;background:var(--surface-cl);
    border:1px solid rgba(194,198,211,.3);border-radius:16px;padding:12px 18px;margin-bottom:13px}
  .statsbar .sc{display:flex;flex-direction:column;align-items:center;flex:1}
  .statsbar .sv{font-size:20px;font-weight:600;color:var(--on-surface)}
  .statsbar .sc:first-child .sv{color:var(--primary)}
  .statsbar .sv small{font-size:13px;font-weight:400;color:var(--on-surface-variant)}
  .statsbar .sl{font-size:11px;font-weight:500;color:var(--outline);letter-spacing:.04em;margin-top:2px}
  .statsbar .sd{width:1px;height:32px;background:rgba(194,198,211,.3)}
  #flags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}
  .flag{display:inline-flex;align-items:center;gap:5px;background:var(--surface-c);
    border:1px solid rgba(194,198,211,.5);border-radius:9999px;padding:5px 12px;
    font-size:12px;font-weight:500;color:var(--on-surface-variant)}
  .flag.sun{background:#ffdcc3;border-color:rgba(255,183,125,.5);color:#6e3900}
  .flag .ms{font-size:15px}
  .actions{display:flex;gap:12px;margin-top:4px}
  #listBtn{flex:0 0 56px;width:56px;height:56px;border-radius:50%;background:var(--surface);
    border:1px solid rgba(194,198,211,.3);color:var(--primary);font-size:22px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,52,111,.08)}
  #navBtn{flex:1}
  #navBtn:disabled{opacity:.45}

  /* step cards (Stitch: Route Details) */
  #steps{list-style:none;margin-top:16px;display:none;flex-direction:column;gap:12px;padding:0}
  #steps.open{display:flex}
  #steps li{position:relative;background:var(--surface-cl);border:1px solid rgba(194,198,211,.3);
    border-radius:22px;padding:13px 14px;display:flex;gap:13px;align-items:flex-start;
    box-shadow:0 4px 20px rgba(0,52,111,.05)}
  #steps li+li::before{content:"";position:absolute;left:36px;top:-13px;height:13px;width:2px;
    background:rgba(194,198,211,.5)}
  #steps li .ic2{flex:0 0 44px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:21px;background:rgba(0,52,111,.1);color:var(--primary)}
  #steps li.bridge .ic2{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,52,111,.25)}
  #steps li.arrive .ic2{background:var(--tertiary-container);color:#fff}
  #steps li .tx{flex:1;padding-top:3px}
  #steps li .t1{font-size:15px;font-weight:600;color:var(--on-surface);line-height:1.4}
  #steps li.bridge .t1 b{color:var(--primary)}
  #steps li .hrs{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:9999px;
    background:var(--surface-c);border:1px solid rgba(194,198,211,.4);color:var(--on-surface-variant);margin-top:6px}
  #steps li.done{opacity:.38}

  #geoMsg{display:none;margin:0 0 12px;padding:10px 14px;border-radius:16px;background:#ffdcc3;
    color:#603100;font-size:13px;line-height:1.5;font-weight:500}
  #noroute{display:none;margin:4px 0 8px;padding:12px 16px;border-radius:16px;background:#ffdad6;
    color:#93000a;font-size:13.5px;line-height:1.5;font-weight:500}

  /* ── live navigation (Stitch: Navigating) — HUD on TOP ── */
  #navTop{display:none;position:absolute;z-index:1250;top:14px;left:14px;right:14px;
    background:rgba(246,250,255,.95);backdrop-filter:blur(10px);border-radius:24px;
    box-shadow:var(--shadow);overflow:hidden}
  @media (min-width:641px){#navTop{left:16px;right:auto;width:420px}}
  #navTop .ntmain{padding:20px;display:flex;align-items:flex-start;gap:16px}
  #navManIcon{width:64px;height:64px;flex:0 0 64px;background:var(--secondary-container);
    color:var(--on-secondary-container);border-radius:18px;display:flex;align-items:center;
    justify-content:center;font-size:40px;font-weight:700}
  #navManTitle{font-size:21px;font-weight:600;color:var(--on-surface);line-height:1.3}
  #navNext{font-size:16px;font-weight:500;color:var(--secondary);margin-top:5px;line-height:1.4}
  #navTop .gps{background:var(--surface-cl);padding:8px 16px;border-top:1px solid rgba(194,198,211,.3);
    display:flex;align-items:center;gap:8px}
  #navTop .gps .dot2{width:8px;height:8px;border-radius:50%;background:#66df75}
  #navStatus{font-size:12px;font-weight:500;color:var(--on-surface-variant)}
  #navBottom{display:none;position:absolute;z-index:1250;bottom:0;left:0;width:100%;
    background:var(--surface);border-top:1px solid rgba(194,198,211,.3);border-radius:24px 24px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -4px 12px rgba(0,0,0,.05)}
  @media (min-width:641px){#navBottom{left:16px;bottom:16px;width:420px;border-radius:24px;border:1px solid rgba(194,198,211,.3)}}
  #navBottom .row2{display:flex;align-items:center;justify-content:space-between}
  #navRemain{font-size:32px;font-weight:700;letter-spacing:-.02em;color:var(--tertiary-container)}
  #navEta{font-size:15px;color:var(--on-surface-variant);margin-top:3px}
  #endNavBtn{background:var(--error);color:var(--on-error);border-radius:9999px;padding:13px 22px;
    font-size:14px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:7px;
    box-shadow:0 2px 8px rgba(186,26,26,.3)}
  #endNavBtn:active{transform:scale(.95)}
  #navTop.arrived #navManIcon{background:var(--tertiary-container);color:#fff}

  /* ── map markers & layers ── */
  .bic-w{background:none;border:none}
  .bic{width:20px;height:20px;margin:4px;border-radius:50%;background:#fff;border:1.5px solid #6f93b4;color:#3a6f9d;
    display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 4px rgba(30,60,90,.25)}
  .bic:hover{border-color:var(--primary);color:var(--primary)}
  .blabel{background:none;border:none}
  .blabel span{display:inline-block;transform:translate(13px,-50%);white-space:nowrap;
    font-size:10.5px;font-weight:600;color:var(--on-surface);background:rgba(255,255,255,.9);
    padding:1px 7px;border-radius:9999px;border:1px solid #d3e2ef;pointer-events:none}
  .attr-pin{background:none;border:none}
  .attr-pin .pin{display:flex;align-items:center;gap:5px;transform:translate(-15px,-15px);cursor:pointer}
  .attr-pin .ic{width:30px;height:30px;border-radius:50%;background:var(--secondary-container);
    border:2px solid #fff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;
    box-shadow:0 2px 8px rgba(120,80,0,.35)}
  .z-lo .attr-pin .nm{display:none}
  .attr-pin .nm{font-size:11px;font-weight:600;color:#603100;background:rgba(255,251,240,.95);
    border:1px solid #ecd9ab;border-radius:9999px;padding:2px 8px;white-space:nowrap}
  .me-dot{background:none;border:none}
  .me-dot .mew{width:38px;height:38px;transition:transform .25s ease;transform-origin:50% 50%;
    filter:drop-shadow(0 2px 6px rgba(0,52,111,.45))}
  .leaflet-popup-content-wrapper{background:var(--surface);color:var(--on-surface);border-radius:20px;
    box-shadow:var(--shadow);font-family:var(--sans)}
  .leaflet-popup-tip{background:var(--surface)}
  .leaflet-popup-content{margin:13px 15px;font-size:14px;line-height:1.4}
  .pbtns{display:flex;gap:8px;margin-top:10px}
  .pbtns button{padding:9px 14px;font-size:13px;font-weight:600;min-height:40px;border-radius:9999px;
    background:var(--surface-c);color:var(--primary)}
  .pbtns .pprimary{background:var(--tertiary-container);color:#fff}
  .leaflet-control-attribution{background:rgba(255,255,255,.8)!important;color:var(--outline)!important;font-size:9.5px!important}
  .leaflet-control-attribution a{color:var(--surface-tint)!important}
  .pulse{animation:pp 1.6s ease-in-out infinite}
  @keyframes pp{50%{opacity:.55}}
  @media (prefers-reduced-motion:reduce){.pulse,.dot2{animation:none}}
  .navmode #panel,.navmode #topbar,.navmode #suggest{display:none!important}
  .leaflet-touch .leaflet-bar a{width:44px;height:44px;line-height:44px;font-size:20px;color:var(--primary)}
  .leaflet-bar{box-shadow:var(--shadow)!important;border-radius:14px!important;overflow:hidden;border:none!important}

  @media (max-width:640px){
    #topbar{left:10px;right:10px;width:auto;max-width:none}
    #suggest{left:10px;right:10px;width:auto;max-width:none}
    #steps li .t1{font-size:15.5px}
    .pbtns button{min-height:44px;font-size:14px}
  }
</style>
</head>
<body>
<div id="map" role="application" aria-label="Plus 15 network map"></div>

<!-- floating top search (Stitch: Search Places) -->
<div id="topbar">
  <span class="ms" data-fb="🔍">search</span>
  <input id="searchBox" type="text" placeholder="Search for a building or place…" autocomplete="off" aria-label="Search destination">
  <button id="searchClear" type="button" aria-label="Clear search" style="display:none">✕</button>
</div>
<div id="suggest" role="listbox"></div>
<button id="popBtn" type="button" style="display:none"></button>
<div id="popMenu" style="display:none"></div>

<!-- floating action buttons -->
<div id="fabs">
  <button id="recenterBtn" type="button" aria-label="My location"><span class="ms" data-fb="◎">my_location</span></button>
</div>

<!-- bottom sheet: home -> destination -> route preview -->
<div id="panel" style="display:none">
  <div id="handle" role="button" aria-label="Expand or collapse panel" tabindex="0"></div>
  <div class="body">
    <div id="geoMsg"></div>
    <div id="hint" style="display:none"></div>

    <div id="homeCard" style="display:none">
      <div class="qa">
        <button id="qaLoc" type="button">
          <span class="qi loc"><span class="ms" data-fb="📍">my_location</span></span>
          <span class="t">My location</span>
        </button>
        <button id="qaTop" type="button">
          <span class="qi star"><span class="ms" data-fb="★">star</span></span>
          <span class="t">Attractions</span>
        </button>
      </div>
      <h2 class="sheet-h2">Popular places</h2>
      <div id="popGrid"></div>
    </div>

    <div id="destCard" style="display:none">
      <div class="dc-top">
        <div style="min-width:0">
          <div id="dcName">—</div>
          <div id="dcBlurb"></div>
        </div>
        <button id="clear" type="button" class="xbtn" aria-label="Close">✕</button>
      </div>
      <button id="locBtn" class="bigbtn go" type="button"><span class="ms" data-fb="➤">navigation</span> DIRECTIONS</button>
      <div class="dc-hint">…or tap the map / a building dot to choose a different starting point.</div>
    </div>

    <div id="result">
      <div class="ab">
        <div class="dots"><span class="da"></span><span class="dl"></span><span class="db"></span></div>
        <div class="names">
          <div class="nm2" id="abFrom">My location</div>
          <div class="sep"></div>
          <div class="nm2" id="abTo">—</div>
        </div>
        <button id="swap" type="button" title="Swap direction"><span class="ms" data-fb="⇅">swap_vert</span></button>
        <button id="clear2" type="button" class="xbtn" aria-label="Close" style="flex-basis:40px">✕</button>
      </div>
      <div class="statsbar">
        <div class="sc"><span class="sv" id="stTime">—</span><span class="sl">WALKING</span></div>
        <div class="sd"></div>
        <div class="sc"><span class="sv" id="stDist">—</span><span class="sl">DISTANCE</span></div>
        <div class="sd"></div>
        <div class="sc"><span class="sv" id="stBr">—</span><span class="sl">BRIDGES</span></div>
      </div>
      <div id="flags"></div>
      <div class="actions">
        <button id="listBtn" type="button" aria-label="View step-by-step list"><span class="ms" data-fb="☰">list</span></button>
        <button id="navBtn" class="bigbtn go" type="button"><span class="ms" data-fb="➤">navigation</span> START</button>
      </div>
      <ol id="steps"></ol>
    </div>
    <div id="noroute"></div>
    <input id="inA" type="hidden"><input id="inB" type="hidden"><datalist id="bldgs"></datalist>
  </div>
</div>

<!-- live navigation (Stitch: Navigating) -->
<div id="navTop">

<script>
const G = JSON.parse(document.getElementById('graph').textContent);
const POLYS=G.polys, PORTALS=G.portals, BLDGS=G.buildings, ATTRS=G.attractions||[];
/* Material Symbols with graceful fallback when the icon font can't load */
let MSOK=true;
function msym(name,fb){return MSOK?('<span class="ms" data-fb="'+fb+'">'+name+'</span>'):('<span>'+fb+'</span>');}
function checkIconFont(){
  try{
    if(document.fonts&&!document.fonts.check('1em "Material Symbols Outlined"')){
      MSOK=false;
      document.querySelectorAll('.ms').forEach(el=>{el.textContent=el.dataset.fb||'•';el.style.fontFamily='inherit';});
    }
  }catch(_){}}
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>setTimeout(checkIconFont,300));
window.addEventListener('load',()=>setTimeout(checkIconFont,1500));

/* ---------- geometry ---------- */
function hav(a,b){const R=6371000,r=Math.PI/180;
  const la1=a[0]*r,la2=b[0]*r,dla=(b[0]-a[0])*r,dlo=(b[1]-a[1])*r;
  const h=Math.sin(dla/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dlo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));}
function pointInPoly(pt,ring){let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const yi=ring[i][0],xi=ring[i][1],yj=ring[j][0],xj=ring[j][1];
    if(((yi>pt[0])!==(yj>pt[0]))&&(pt[1]<(xj-xi)*(pt[0]-yi)/(yj-yi)+xi))inside=!inside;}
  return inside;}
function closestOnRing(pt,ring){
  const r=Math.PI/180,kx=Math.cos(pt[0]*r)*111320,ky=110540;
  const P=[pt[1]*kx,pt[0]*ky];let best=null;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const A=[ring[j][1]*kx,ring[j][0]*ky],B=[ring[i][1]*kx,ring[i][0]*ky];
    const dx=B[0]-A[0],dy=B[1]-A[1],L2=dx*dx+dy*dy;
    let t=L2?((P[0]-A[0])*dx+(P[1]-A[1])*dy)/L2:0;t=Math.max(0,Math.min(1,t));
    const X=A[0]+t*dx,Y=A[1]+t*dy,d=Math.hypot(P[0]-X,P[1]-Y);
    if(!best||d<best.d)best={d,pt:[Y/ky,X/kx]};}
  return best;}
function nearestPoly(pt,maxSnap){
  let best=null;
  for(const p of POLYS){
    if(pointInPoly(pt,p.g))return{poly:p.i,d:0,snap:pt};
    if(hav(pt,p.c)>(maxSnap||80)+260)continue;          // cheap prefilter
    const c=closestOnRing(pt,p.g);
    if(!best||c.d<best.d)best={d:c.d,poly:p.i,snap:c.pt};}
  return best&&best.d<=(maxSnap||80)?best:null;}
function insideOrSnap(poly,pt){
  return pointInPoly(pt,POLYS[poly].g)?pt:closestOnRing(pt,POLYS[poly].g).pt;}

// nearest point on a polyline (local equirectangular approx) -> {pt,segIdx,t,dist}
function snapToLine(pt,line){
  const r=Math.PI/180, lat0=pt[0]*r, kx=Math.cos(lat0)*111320, ky=110540;
  const P=[pt[1]*kx, pt[0]*ky];
  let best=null;
  for(let i=0;i<line.length-1;i++){
    const A=[line[i][1]*kx,line[i][0]*ky], B=[line[i+1][1]*kx,line[i+1][0]*ky];
    const dx=B[0]-A[0],dy=B[1]-A[1],L2=dx*dx+dy*dy;
    let t=L2?((P[0]-A[0])*dx+(P[1]-A[1])*dy)/L2:0; t=Math.max(0,Math.min(1,t));
    const X=A[0]+t*dx,Y=A[1]+t*dy, d=Math.hypot(P[0]-X,P[1]-Y);
    if(!best||d<best.dist)best={dist:d,segIdx:i,t,pt:[Y/ky,X/kx]};
  }
  return best;}

/* ---------- portal graph + Dijkstra ---------- */
const polyPortals=Array.from({length:POLYS.length},()=>[]);
PORTALS.forEach((pt,i)=>{polyPortals[pt.a].push(i);polyPortals[pt.b].push(i);});
class MinHeap{constructor(){this.a=[];}
  push(x){const a=this.a;a.push(x);let i=a.length-1;
    while(i>0){const p=(i-1)>>1;if(a[p][0]<=a[i][0])break;[a[p],a[i]]=[a[i],a[p]];i=p;}}
  pop(){const a=this.a,t=a[0],l=a.pop();if(a.length){a[0]=l;let i=0;
    for(;;){let s=i,L=2*i+1,R=L+1;if(L<a.length&&a[L][0]<a[s][0])s=L;if(R<a.length&&a[R][0]<a[s][0])s=R;
      if(s===i)break;[a[s],a[i]]=[a[i],a[s]];i=s;}}return t;}
  get size(){return this.a.length;}}
/* interior door-to-door paths precomputed in the data (visibility-graph shortest paths) */
const IP=G.ip||{};
function ipGet(w,u,v){
  const d=IP[String(w)];if(!d)return null;
  const k=u<v?u+'_'+v:v+'_'+u, arr=d[k];if(!arr)return null;
  const pts=[];for(let i=1;i<arr.length;i+=2)pts.push([arr[i],arr[i+1]]);
  if(u>v)pts.reverse();
  return{len:arr[0],pts};}
function S(u,w){const p=PORTALS[u];return p.a===w?(p.sa||p.p):(p.sb||p.p);}
/* strict proper segment crossing (touching at endpoints allowed) */
function segsCross(p1,p2,p3,p4){
  const o=(a,b,c)=>Math.sign((b[1]-a[1])*(c[0]-b[0])-(b[0]-a[0])*(c[1]-b[1]));
  const o1=o(p1,p2,p3),o2=o(p1,p2,p4),o3=o(p3,p4,p1),o4=o(p3,p4,p2);
  return o1!==o2&&o3!==o4&&o1!==0&&o2!==0&&o3!==0&&o4!==0;}
function segInside(ring,a,b){
  for(let i=0,j=ring.length-1;i<ring.length;j=i++)
    if(segsCross(a,b,ring[j],ring[i]))return false;
  return pointInPoly([(a[0]+b[0])/2,(a[1]+b[1])/2],ring);}
/* shortest path between two points INSIDE one polygon, hugging its shape */
function visPath(w,from,to){
  const g=POLYS[w].g;
  if(segInside(g,from,to))return{len:hav(from,to),pts:[from,to]};
  let ring=g;if(ring.length>1&&ring[0][0]===ring[ring.length-1][0]&&ring[0][1]===ring[ring.length-1][1])ring=ring.slice(0,-1);
  const nodes=[from,...ring,to],n=nodes.length;
  const adj=Array.from({length:n},()=>[]);
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)
    if(segInside(g,nodes[i],nodes[j])){const w2=hav(nodes[i],nodes[j]);adj[i].push([j,w2]);adj[j].push([i,w2]);}
  const dist=new Array(n).fill(Infinity),prev=new Array(n).fill(-1),pq=new MinHeap();
  dist[0]=0;pq.push([0,0]);
  while(pq.size){const[d,u]=pq.pop();if(u===n-1)break;if(d>dist[u])continue;
    for(const[v,w2] of adj[u])if(d+w2<dist[v]){dist[v]=d+w2;prev[v]=u;pq.push([d+w2,v]);}}
  if(!isFinite(dist[n-1]))return{len:hav(from,to),pts:[from,to]};
  const pts=[];let x=n-1;while(x!==-1){pts.push(nodes[x]);x=prev[x];}pts.reverse();
  return{len:dist[n-1],pts};}
function route(spoly,epoly,sc,ec){
  const sFix=insideOrSnap(spoly,sc),eFix=insideOrSnap(epoly,ec);
  if(spoly===epoly){const v=visPath(spoly,sFix,eFix);
    return{dist:v.len,path:[],coords:v.pts,startPt:sFix,endPt:eFix};}
  const startLeg={},endLeg={};
  for(const u of polyPortals[spoly]){const v=visPath(spoly,sFix,S(u,spoly));
    startLeg[u]={len:v.len+hav(S(u,spoly),PORTALS[u].p),pts:v.pts};}
  for(const u of polyPortals[epoly]){const v=visPath(epoly,S(u,epoly),eFix);
    endLeg[u]={len:v.len+hav(PORTALS[u].p,S(u,epoly)),pts:v.pts};}
  const hop=(x,w)=>hav(PORTALS[x].p,S(x,w));
  const dist=new Map([[-1,0]]),prev=new Map(),pq=new MinHeap();pq.push([0,-1]);
  while(pq.size){const[d,u]=pq.pop();
    if(u===-2)break;if(d>(dist.get(u)??Infinity))continue;
    const relax=(v,w2)=>{if(d+w2<(dist.get(v)??Infinity)){dist.set(v,d+w2);prev.set(v,u);pq.push([d+w2,v]);}};
    if(u===-1){for(const pi of polyPortals[spoly])relax(pi,startLeg[pi].len);}
    else{for(const w of[PORTALS[u].a,PORTALS[u].b]){
      for(const pi of polyPortals[w])if(pi!==u){
        const ip=ipGet(w,u,pi);
        relax(pi,hop(u,w)+(ip?ip.len:hav(S(u,w),S(pi,w)))+hop(pi,w));}
      if(w===epoly)relax(-2,endLeg[u].len);}}}
  if(!dist.has(-2))return null;
  const path=[];let u=prev.get(-2);
  while(u!==-1){path.push(u);u=prev.get(u);}
  path.reverse();
  // stitch the geometry: start leg -> interior paths between doors -> end leg
  const coords=[];const push=p=>{const l=coords[coords.length-1];
    if(!l||Math.abs(l[0]-p[0])>1e-7||Math.abs(l[1]-p[1])>1e-7)coords.push(p);};
  let cur=spoly,prevPortal=null;
  for(const u2 of path){
    if(prevPortal===null)startLeg[u2].pts.forEach(push);
    else{const ip=ipGet(cur,prevPortal,u2);
      push(S(prevPortal,cur));
      (ip?ip.pts:[S(prevPortal,cur),S(u2,cur)]).forEach(push);}
    push(PORTALS[u2].p);
    cur=PORTALS[u2].a===cur?PORTALS[u2].b:PORTALS[u2].a;
    prevPortal=u2;}
  endLeg[path[path.length-1]].pts.forEach(push);
  return{dist:dist.get(-2),path,coords,startPt:sFix,endPt:eFix};}
/* ---- turn-by-turn maneuvers, Google-Maps style ---- */
function polylineLen(c){let L=0;for(let i=0;i<c.length-1;i++)L+=hav(c[i],c[i+1]);return L;}
function signedTurn(b1,b2){return ((b2-b1+540)%360)-180;}   // +right / -left
function buildManeuvers(coords){
  const M=[];let cum=0;
  for(let i=1;i<coords.length-1;i++){
    cum+=hav(coords[i-1],coords[i]);
    // skip micro-vertices: look far enough back/ahead for a stable bearing
    if(hav(coords[i-1],coords[i])<2&&i>1)continue;
    const t=signedTurn(bearing(coords[i-1],coords[i]),bearing(coords[i],coords[i+1]));
    const a=Math.abs(t);
    if(a<28)continue;
    let txt,gl;
    if(a>=150){txt='Turn around';gl='⮐';}
    else if(a>=110){txt=t>0?'Sharp right':'Sharp left';gl=t>0?'↱':'↰';}
    else if(a>=55){txt=t>0?'Turn right':'Turn left';gl=t>0?'→':'←';}
    else{txt=t>0?'Bear right':'Bear left';gl=t>0?'↗':'↖';}
    // merge with a previous maneuver almost on the same spot
    if(M.length&&cum-M[M.length-1].d<6){M[M.length-1].txt=txt;M[M.length-1].gl=gl;M[M.length-1].d=cum;continue;}
    M.push({d:cum,txt,gl,ll:coords[i]});}
  return M;}
function polySequence(path,spoly){const seq=[spoly];let cur=spoly;
  for(const u of path){if(u<0)continue;
    const nxt=PORTALS[u].a===cur?PORTALS[u].b:PORTALS[u].a;
    if(nxt!==cur){seq.push(nxt);cur=nxt;}}return seq;}

/* ---------- map ---------- */
const map=L.map('map',{zoomControl:false,attributionControl:false,maxZoom:20});
L.control.zoom({position:'topright'}).addTo(map);
L.control.attribution({position:'bottomleft',prefix:false}).addTo(map);

/* base map: streets, buildings & POI labels (CARTO dark, OSM data) */
let tilesOK=false;
const base=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  maxZoom:20,subdomains:'abcd',
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);
base.on('tileload',()=>{tilesOK=true;const n=document.getElementById('tileNote');if(n)n.remove();});
setTimeout(()=>{
  if(!tilesOK){
    const n=document.createElement('div');n.id='tileNote';
    n.style.cssText='position:absolute;z-index:1000;left:50%;top:12px;transform:translateX(-50%);background:#ffffff;border:1px solid #c9d9e8;color:#5e7a96;font:11.5px -apple-system,Segoe UI,Roboto,sans-serif;padding:6px 12px;border-radius:99px;box-shadow:0 4px 14px rgba(30,60,90,.15)';
    n.textContent='Street basemap unavailable here — routing still works. Open the file directly in a browser to see streets.';
    document.body.appendChild(n);
    setTimeout(()=>n.remove(),9000);
  }
},4000);
let bounds=null;
for(const p of POLYS){
  const enclosed=!(p.s||'').includes('Open');

    ?{color:enclosed?'#1b6fae':'#7d9cb8',weight:1.6,fillColor:enclosed?'#4aa3dc':'#93b5cd',fillOpacity:enclosed?0.85:0.55}

/* ---------- routing + step list ---------- */
function buildSteps(seq){
  const steps=[];let bridges=0,openAir=false,weekdayOnly=false,run=0,runHours=null;
  const flush=()=>{if(run>0){steps.push({cls:'',txt:'Follow the corridor'+(run>1?' through '+run+' sections':''),hrs:runHours,poly:null});run=0;runHours=null;}};
  for(const pi of seq){const p=POLYS[pi];
    if((p.s||'').includes('Open'))openAir=true;
    if((p.h||'').startsWith('Monday'))weekdayOnly=true;
    if(p.k==='bridge'){flush();bridges++;steps.push({cls:'bridge',txt:'Cross the bridge: <b>'+(p.n||'unnamed')+'</b>',hrs:null,poly:pi});}
    else{run++;if(p.h)runHours=p.h;}}
  flush();steps.push({cls:'',txt:'Arrive at your destination',hrs:null,poly:null});
  return{steps,bridges,openAir,weekdayOnly};}
function tryRoute(){
  if(!A||!B)return;
  if(routeLine)map.removeLayer(routeLine);if(routeGlow)map.removeLayer(routeGlow);
  routeDash.forEach(d=>map.removeLayer(d));routeDash=[];
  const nr=document.getElementById('noroute'),res=document.getElementById('result');
  const r=route(A.poly,B.poly,A.coord,B.coord);
  if(!r){res.style.display='none';nr.style.display='block';panelEl.style.display='flex';
    document.getElementById('destCard').style.display='none';
    nr.innerHTML=POLYS[A.poly].comp!==POLYS[B.poly].comp
      ?'These two points sit in <b>disconnected sections</b> of the +15 — the city data shows no enclosed link between them. Part of this trip would be at street level.'
      :'No path found between these points.';return;}
  nr.style.display='none';lastRoute=r;lastSeq=polySequence(r.path,A.poly);
  lastManeuvers=buildManeuvers(r.coords);lastRouteLen=polylineLen(r.coords);
  routeGlow=L.polyline(r.coords,{color:'#fd8b00',weight:11,opacity:0.25,lineJoin:'round'}).addTo(map);
  routeLine=L.polyline(r.coords,{color:'#fd8b00',weight:4.5,opacity:1,lineJoin:'round'}).addTo(map);
  let extra=0;
  if(hav(A.coord,r.startPt)>25){routeDash.push(L.polyline([A.coord,r.startPt],{color:'#8aa3b8',weight:3.5,dashArray:'2 8',lineCap:'round'}).addTo(map));extra+=hav(A.coord,r.startPt);}
  if(hav(r.endPt,B.coord)>25){routeDash.push(L.polyline([r.endPt,B.coord],{color:'#8aa3b8',weight:3.5,dashArray:'2 8',lineCap:'round'}).addTo(map));extra+=hav(r.endPt,B.coord);}
  if(!NAV.on){let bb=routeLine.getBounds();for(const d of routeDash)bb=bb.extend(d.getBounds());map.fitBounds(bb.pad(0.25));}
  const m=Math.round(r.dist+extra);
  document.getElementById('stDist').innerHTML=m>=1000?((m/1000).toFixed(2)+' <small>km</small>'):(m+' <small>m</small>');
  document.getElementById('stTime').innerHTML=Math.max(1,Math.round(m/80))+' <small>min</small>';
  const{steps,bridges,openAir,weekdayOnly}=buildSteps(lastSeq);
  document.getElementById('stBr').textContent=bridges;
  const fl=document.getElementById('flags');fl.innerHTML='';
  if(weekdayOnly)fl.innerHTML+='<span class="flag">'+msym('schedule','⏰')+' Open Mon–Fri 7am–9pm only</span>';
  if(openAir)fl.innerHTML+='<span class="flag sun">'+msym('wb_sunny','❄')+' Includes open-air sections</span>';
  if(B.gap&&B.gap>40)fl.innerHTML+='<span class="flag">'+msym('directions_walk','🚶')+' Last ~'+B.gap+' m at street level</span>';
  const vsum=r.path.filter(u=>u>=0&&PORTALS[u].v).reduce((s,u)=>s+PORTALS[u].v,0);
  if(vsum>15)fl.innerHTML+='<span class="flag">'+msym('link','🔗')+' ~'+vsum+' m via unmapped connections</span>';
  const ol=document.getElementById('steps');ol.innerHTML='';
  steps.forEach((s,i)=>{
    const li=document.createElement('li');
    const last=i===steps.length-1;
    li.className=last?'arrive':s.cls;
    const icon=last?msym('flag','⚑'):(s.cls==='bridge'?msym('architecture','🌉'):msym('straight','⬆'));
    li.innerHTML='<span class="ic2">'+icon+'</span><div class="tx"><div class="t1">'+s.txt+'</div>'
      +(s.hrs?('<span class="hrs">'+s.hrs+'</span>'):'')+'</div>';
    if(s.poly!=null)li.dataset.poly=s.poly;
    ol.appendChild(li);});
  document.getElementById('abFrom').textContent=A.label||'Pinned point';
  document.getElementById('abTo').textContent=B.label||'Pinned point';
  showSheet('route');
  document.getElementById('navBtn').disabled=!('geolocation' in navigator);}

const geoMsg=document.getElementById('geoMsg');
function showGeoMsg(html){geoMsg.style.display='block';geoMsg.innerHTML=html;}
function geoErrorText(err){
  if(!window.isSecureContext)return'Location needs a <b>secure context</b> — open this file over HTTPS or localhost (it may also be blocked inside an embedded preview). Download and open it directly in your browser.';
  if(err&&err.code===1)return'Location permission was denied. Allow location access for this page and try again.';
  if(err&&err.code===3)return'Location request timed out — GPS signal is weak inside the +15. Try again near a window.';
  return'Couldn\'t get your location. Note that GPS is unreliable deep inside buildings.';}
function geoStart(showErrors){
  if(!('geolocation' in navigator)){if(showErrors)showGeoMsg('This browser doesn\'t support geolocation.');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const pt=[pos.coords.latitude,pos.coords.longitude];
    const hit=nearestPoly(pt,400);
    if(!hit){showGeoMsg('You appear to be more than 400 m from the +15 network. Head downtown and try again, or pick a starting building manually.');return;}
    if(mA)map.removeLayer(mA);
    A={poly:hit.poly,coord:hit.d===0?pt:POLYS[hit.poly].c,label:'My location'};
    mA=mkPt(A.coord,'#5cd46c');
    document.getElementById('inA').value='My location';
    if(hit.d>30)showGeoMsg('Snapped your position to the nearest corridor ('+Math.round(hit.d)+' m away). GPS accuracy: ±'+Math.round(pos.coords.accuracy)+' m.');
    map.setView(A.coord,17);
    tryRoute();
  },err=>{if(showErrors)showGeoMsg(geoErrorText(err));},{enableHighAccuracy:true,timeout:12000,maximumAge:5000});
}
document.getElementById('locBtn').addEventListener('click',()=>{geoMsg.style.display='none';geoStart(true);});

/* ---------- live navigation ---------- */
const NAV={on:false,watch:null,follow:true,meMarker:null,accCircle:null,lastReroute:0,
  heading:null,headingT:0,lastFixPt:null,routeBearing:null,markerRot:0,dialRot:0};
function bearing(a,b){const r=Math.PI/180;
  const la1=a[0]*r,la2=b[0]*r,dlo=(b[1]-a[1])*r;
  const y=Math.sin(dlo)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dlo);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;}
// rotate an element to `target` degrees via the shortest arc (avoids 359->1 spin-around)
function rotTo(el,current,target){
  const d=((target-current+540)%360)-180, nv=current+d;
  el.style.transform='rotate('+nv+'deg)';return nv;}
const CARDINALS=['north','northeast','east','southeast','south','southwest','west','northwest'];
function cardinal(b){return CARDINALS[Math.round(b/45)%8];}
function onOrient(e){
  let h=null;
  if(typeof e.webkitCompassHeading==='number'&&!isNaN(e.webkitCompassHeading))h=e.webkitCompassHeading; // iOS
  else if(e.absolute===true&&e.alpha!=null){
    h=360-e.alpha;
    const so=(screen.orientation&&screen.orientation.angle)||window.orientation||0;
    h=(h+so)%360;}
  if(h!=null){NAV.heading=(h+360)%360;NAV.headingT=Date.now();updateArrows();}}
function addOrientListeners(){
  const ev='ondeviceorientationabsolute' in window?'deviceorientationabsolute':'deviceorientation';
  window.addEventListener(ev,onOrient,true);NAV._orientEv=ev;}
function removeOrientListeners(){
  if(NAV._orientEv){window.removeEventListener(NAV._orientEv,onOrient,true);NAV._orientEv=null;}}
function effHeading(){
  return (NAV.heading!=null&&Date.now()-NAV.headingT<3000)?NAV.heading:NAV.gpsHeading??null;}
function dirText(rel){
  if(rel<25||rel>335)return'Straight ahead';
  if(rel<70)return'Bear right';if(rel<115)return'Turn right';if(rel<160)return'Sharp right';
  if(rel<=200)return'Turn around';
  if(rel<245)return'Sharp left';if(rel<290)return'Turn left';return'Bear left';}
let throttleArrow=0;
function updateArrows(){
  const now=Date.now();if(now-throttleArrow<120)return;throttleArrow=now;
  if(NAV.routeBearing==null)return;
  const h=effHeading();
  // user marker: face your heading if known, else face along the route
  if(NAV.meMarker){
    const el=NAV.meMarker.getElement&&NAV.meMarker.getElement();
    const mew=el&&el.querySelector('.mew');
    if(mew)NAV.markerRot=rotTo(mew,NAV.markerRot,h!=null?h:NAV.routeBearing);}}
const navTop=document.getElementById('navTop'),navBottom=document.getElementById('navBottom');
const MICON={ '←':'turn_left','→':'turn_right','↰':'turn_sharp_left','↱':'turn_sharp_right',
  '↖':'turn_slight_left','↗':'turn_slight_right','⮐':'u_turn_left','⬆':'straight','⚑':'flag'};
function setManIcon(gl){document.getElementById('navManIcon').innerHTML=msym(MICON[gl]||'straight',gl);}
function fmtDist(m){return m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';}
function remainingAlong(line,snap){
  let d=hav(snap.pt,line[snap.segIdx+1]);
  for(let i=snap.segIdx+1;i<line.length-1;i++)d+=hav(line[i],line[i+1]);
  return d;}
function nextBridgeAfter(seqIdx){
  for(let i=seqIdx;i<lastSeq.length;i++){const p=POLYS[lastSeq[i]];
    if(p.k==='bridge')return p.n||'unnamed bridge';}
  return null;}
function currentSeqIndex(pos){ // which polygon of the route are we in/nearest to
  let best=0,bd=Infinity;
  lastSeq.forEach((pi,idx)=>{const d=hav(pos,POLYS[pi].c);if(d<bd){bd=d;best=idx;}});
  return best;}
document.getElementById('navBtn').addEventListener('click',()=>{
  if(!lastRoute)return;
  geoMsg.style.display='none';
  if(!('geolocation' in navigator)){showGeoMsg('This browser doesn\'t support geolocation.');return;}
  NAV.on=true;NAV.follow=true;
  try{
    if(window.DeviceOrientationEvent&&typeof DeviceOrientationEvent.requestPermission==='function')
      DeviceOrientationEvent.requestPermission().then(p=>{if(p==='granted')addOrientListeners();}).catch(()=>{});
    else addOrientListeners();
  }catch(_){}
  navTop.style.display='block';navBottom.style.display='block';navTop.classList.remove('arrived');
  document.body.classList.add('navmode');
  setManIcon('⬆');
  document.getElementById('navManTitle').textContent='Starting…';
  document.getElementById('navNext').textContent='Waiting for GPS fix…';
  document.getElementById('navStatus').textContent='Acquiring signal…';
  NAV.watch=navigator.geolocation.watchPosition(onFix,err=>{
    document.getElementById('navStatus').textContent='';
    showGeoMsg(geoErrorText(err));endNav(false);
  },{enableHighAccuracy:true,maximumAge:2000,timeout:20000});
});
function onFix(pos){
  if(!NAV.on||!lastRoute)return;
  const pt=[pos.coords.latitude,pos.coords.longitude], acc=pos.coords.accuracy;
  if(!NAV.meMarker){
    const arrow='<div class="mew"><svg viewBox="0 0 40 40" width="38" height="38">'
      +'<circle cx="20" cy="20" r="16.5" fill="#255dad" stroke="#fff" stroke-width="3.5"/>'
      +'<path d="M20 9.5 L27 26 L20 22.4 L13 26 Z" fill="#fff"/></svg></div>';
    NAV.meMarker=L.marker(pt,{icon:L.divIcon({className:'me-dot',html:arrow,iconSize:[38,38],iconAnchor:[19,19]}),zIndexOffset:1000}).addTo(map);
    NAV.accCircle=L.circle(pt,{radius:acc,color:'#255dad',weight:1,fillColor:'#255dad',fillOpacity:0.1}).addTo(map);
  }else{NAV.meMarker.setLatLng(pt);NAV.accCircle.setLatLng(pt);NAV.accCircle.setRadius(acc);}
  if(NAV.follow)map.setView(pt,Math.max(map.getZoom(),17),{animate:true});

  // heading from GPS course (valid only while moving) and from successive fixes
  NAV.gpsHeading=(pos.coords.heading!=null&&!isNaN(pos.coords.heading)&&(pos.coords.speed||0)>0.3)?pos.coords.heading:null;
  if(NAV.lastFixPt&&hav(NAV.lastFixPt,pt)>3){
    if(NAV.gpsHeading==null)NAV.gpsHeading=bearing(NAV.lastFixPt,pt);
    NAV.lastFixPt=pt;
  }else if(!NAV.lastFixPt)NAV.lastFixPt=pt;

  const snap=snapToLine(pt,lastRoute.coords);
  const remain=remainingAlong(lastRoute.coords,snap);
  const distToDest=hav(pt,B.coord);
  // bearing you SHOULD walk: from your snapped spot toward a point ~12 m further along the route
  {let tgt=lastRoute.coords[snap.segIdx+1],i=snap.segIdx+1,acc=hav(snap.pt,tgt);
   while(acc<12&&i<lastRoute.coords.length-1){i++;acc+=hav(lastRoute.coords[i-1],lastRoute.coords[i]);tgt=lastRoute.coords[i];}
   NAV.routeBearing=bearing(snap.pt,tgt);}
  updateArrows();

  // arrival
  if(distToDest<25||(remain<20&&(!B.gap||B.gap<40))){
    navTop.classList.add('arrived');
    setManIcon('⚑');
    document.getElementById('navManTitle').textContent='You have arrived';
    document.getElementById('navNext').textContent=B.label||'Destination reached';
    document.getElementById('navRemain').textContent='Arrived';
    document.getElementById('navEta').textContent='';
    document.getElementById('navStatus').textContent='GPS ±'+Math.round(acc)+' m';
    return;}

  // off-route: recompute from current position (max once per 8 s)
  if(snap.dist>40&&Date.now()-NAV.lastReroute>8000){
    const hit=nearestPoly(pt,200);
    if(hit){NAV.lastReroute=Date.now();
      if(mA)map.removeLayer(mA);
      A={poly:hit.poly,coord:hit.snap,label:'My location'};mA=null;
      document.getElementById('inA').value='My location';
      tryRoute();      // recomputes route, maneuvers and step list from where they are now
      document.getElementById('navStatus').textContent='↻ Re-routed from your position · GPS ±'+Math.round(acc)+' m';
      return;          // next GPS fix works against the fresh route
    }}
  document.getElementById('navRemain').textContent=Math.max(1,Math.round(remain/80))+' min';
  document.getElementById('navEta').textContent=fmtDist(remain)+' remaining';
  // --- turn-by-turn instruction based on where the user is RIGHT NOW (Stitch top HUD) ---
  const traveled=Math.max(0,lastRouteLen-remain);
  const h2=effHeading();
  const facingBack=h2!=null&&NAV.routeBearing!=null&&Math.abs(signedTurn(h2,NAV.routeBearing))>135;
  const nm=(lastManeuvers||[]).find(mm=>mm.d>traveled+4);
  const nb=nextBridgeAfter(currentSeqIndex(pt));
  let title,sub,gl;
  if(facingBack){gl='⮐';title='Turn around';sub='You\'re heading away from the route';}
  else if(nm){
    const dt=Math.round(nm.d-traveled);
    gl=nm.gl;title=nm.txt;
    sub=(dt<=10?'Now':('In '+(dt<100?dt:Math.round(dt/10)*10)+' m'))+(nb?(' · then cross '+nb):'');}
  else{gl='⬆';title='Continue straight';sub=nb?('Cross '+nb+' ahead'):'Head to your destination';}
  setManIcon(gl);
  document.getElementById('navManTitle').textContent=title;
  document.getElementById('navNext').textContent=sub;
  if(!document.getElementById('navStatus').textContent.startsWith('↻'))
    document.getElementById('navStatus').textContent='GPS ±'+Math.round(acc)+' m'+(acc>50?' — weak signal (normal indoors)':'');
  // mark passed steps
  const idx=currentSeqIndex(pt);
  document.querySelectorAll('#steps li[data-poly]').forEach(li=>{
    const si=lastSeq.indexOf(+li.dataset.poly);
    li.classList.toggle('done',si>=0&&si<idx);});
}
map.on('dragstart',()=>{if(NAV.on)NAV.follow=false;});
document.getElementById('recenterBtn').addEventListener('click',()=>{
  if(NAV.on){NAV.follow=true;if(NAV.meMarker)map.setView(NAV.meMarker.getLatLng(),17);}
  else geoStart(true);});
function endNav(refit){
  NAV.on=false;removeOrientListeners();
  NAV.heading=null;NAV.gpsHeading=null;NAV.lastFixPt=null;NAV.routeBearing=null;NAV._dirPhrase=null;
  if(NAV.watch!=null){navigator.geolocation.clearWatch(NAV.watch);NAV.watch=null;}
  if(NAV.meMarker){map.removeLayer(NAV.meMarker);NAV.meMarker=null;}
  if(NAV.accCircle){map.removeLayer(NAV.accCircle);NAV.accCircle=null;}
  navTop.style.display='none';navBottom.style.display='none';
  document.body.classList.remove('navmode');
  document.querySelectorAll('#steps li.done').forEach(li=>li.classList.remove('done'));
  if(refit&&routeLine)map.fitBounds(routeLine.getBounds().pad(0.25));}
document.getElementById('endNavBtn').addEventListener('click',()=>endNav(true));

/* ---------- mobile bottom sheet ---------- */
const isMobile=window.matchMedia('(max-width:640px)');
const panel=document.getElementById('panel');
const handle=document.getElementById('handle');
function collapseSheet(v){if(isMobile.matches)panel.classList.toggle('collapsed',v);}
handle.addEventListener('click',()=>panel.classList.toggle('collapsed'));
handle.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();panel.classList.toggle('collapsed');}});
// drag to expand/collapse
let dragY=null;
handle.addEventListener('pointerdown',e=>{dragY=e.clientY;handle.setPointerCapture(e.pointerId);});
handle.addEventListener('pointermove',e=>{
  if(dragY==null)return;
  const dy=e.clientY-dragY;
  if(dy>34){collapseSheet(true);dragY=null;}
  else if(dy<-34){collapseSheet(false);dragY=null;}});
handle.addEventListener('pointerup',()=>{dragY=null;});
// tapping the map to pick points: tuck the sheet away so the map is visible
map.on('click',()=>{if(!NAV.on)collapseSheet(true);});
// when a route is ready, surface the results
const _tryRoute=tryRoute;
tryRoute=function(){_tryRoute();if(lastRoute)collapseSheet(false);};
// focusing a search field needs the full sheet
for(const id of ['inA','inB'])document.getElementById(id).addEventListener('focus',()=>collapseSheet(false));
// start collapsed on mobile so the map leads
showSheet('home');
if(isMobile.matches)collapseSheet(true);
</script>
